name: ImageSummarization

options:
  bundleIdPrefix: com.rd
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: "YES"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    USDA_API_KEY: ""

targets:
  ImageSummarization:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ImageSummarization
        excludes:
          - "Resources/MLModels/README.md"
    resources:
      - path: ImageSummarization/Resources
        excludes:
          - "MLModels/README.md"
    info:
      path: ImageSummarization/Resources/Info.plist
      properties:
        CFBundleDisplayName: ImageSummarization
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "This app requires camera access to capture images for text extraction."
        NSPhotoLibraryUsageDescription: "This app requires photo library access to select images for text extraction."
        NSPhotoLibraryAddUsageDescription: "This app requires permission to save images to your photo library."
        USDAFoodDataCentralAPIKey: "$(USDA_API_KEY)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rd.ImageSummarization
        INFOPLIST_FILE: ImageSummarization/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - sdk: Vision.framework
      - sdk: CoreML.framework
      - sdk: Photos.framework
      - sdk: AVFoundation.framework
      - sdk: NaturalLanguage.framework
      - sdk: FoundationModels.framework
        weak: true

configs:
  Debug:
    type: debug
  Release:
    type: release
